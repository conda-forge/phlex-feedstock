context:
  version: "0.3.1"

package:
  name: phlex
  version: ${{ version }}

source:
  url: https://github.com/Framework-R-D/phlex/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1689fced4229b82be54269b2e785ad75f65869dbbbe0275194620294bc9b9095

build:
  number: 0
  skip:
    # phlex requires GCC 15 (libstdc++ 15 for std::vector(from_range, ...))
    # and is not yet supported on macOS (libc++ lacks std::jthread)
    - win
    - osx
    - match(root_cxx_standard, "<23")
    # the python/numba plugin requires find_package(Python 3.12 ...)
    - match(python, "<3.12")
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
    - pkg-config
  host:
    - cetmodules
    - libboost-devel
    - fmt
    - tbb-devel
    - spdlog
    - libjsonnet
    # required by the python/numba plugin (plugins/python)
    - libffi
    - python
    - numpy
    - root_base
    - root_cxx_standard
  run:
    - python
  run_exports:
    - ${{ pin_subpackage('phlex', upper_bound='x.x') }}

tests:
  - package_contents:
      lib:
        - phlex_core

about:
  homepage: https://github.com/Framework-R-D/phlex
  repository: https://github.com/Framework-R-D/phlex
  summary: Parallel, Hierarchical, and Layered Execution of data-processing algorithms
  description: |
    Phlex is a framework for the Parallel, Hierarchical, and Layered
    Execution of data-processing algorithms. It lets users implement
    algorithms and organise them into multi-threaded workflows
    structured around hierarchical event/data tiers, building on
    Intel TBB for task parallelism and on the patterns established by
    Fermilab's art framework.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
